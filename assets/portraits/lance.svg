  <text x="60" y="430" font-family="Arial, sans-serif" font-size="24" fill="#f6e7c6">Use case: illustration-story Asset type: portrait illustration for a</text><text x="60" y="464" font-family="Arial, sans-serif" font-size="24" fill="#f6e7c6">trading card game character Primary request: create a fantasy portrait</text><text x="60" y="498" font-family="Arial, sans-serif" font-size="24" fill="#f6e7c6">of Lance Style/medium: painted fantasy illustration, high detail,</text><text x="60" y="532" font-family="Arial, sans-serif" font-size="24" fill="#f6e7c6">card-art quality, readable at small size Composition/framing: vertical</text><text x="60" y="566" font-family="Arial, sans-serif" font-size="24" fill="#f6e7c6">portrait, chest-up or waist-up, centered subject, strong silhouette,</text><text x="60" y="600" font-family="Arial, sans-serif" font-size="24" fill="#f6e7c6">leave room near edges for card frame crop Lighting/mood: dramatic but</text><text x="60" y="634" font-family="Arial, sans-serif" font-size="24" fill="#f6e7c6">clean key light, rich contrast, heroic tabletop-card presentation</text><text x="60" y="668" font-family="Arial, sans-serif" font-size="24" fill="#f6e7c6">Color palette: faction-driven fantasy palette with clear subject</text>
